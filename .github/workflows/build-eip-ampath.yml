name: Build and Publish EIP Odoo–OpenMRS AMPATH Image

on:
  push:
    branches: [main]
    paths:
      - 'eip-odoo-openmrs-ampath/**'
      - 'odoo-docker/**'
      - '.github/workflows/build-eip-ampath.yml'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ampath
  REPO_NAME: o3-amrs
  EIP_ODOO_OPENMRS_AMPATH_IMAGE: eip-odoo-openmrs-ampath

jobs:
  build-eip-openmrs-ampath:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract short SHA
        id: vars
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract RELEASE_VERSION from pom.xml
        id: extract_version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout | grep -v '\[')
          echo "RELEASE_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: s4u/maven-settings-action@v3.1.0
        with:
          servers: |
              [{
                  "id": "github",
                  "username": "${{ github.actor }}",
                  "password": "${{ secrets.GITHUB_TOKEN }}"
              }]

      - name: Prepare Odoo Docker build context (compile eip-odoo-openmrs-ampath JAR)
        run: mvn -Podoo-docker clean package -Dskip.docker.build=true

      - name: Build and push EIP Odoo–OpenMRS AMPATH image
        uses: docker/build-push-action@v6
        with:
          context: ./odoo-docker/target/odoo-build
          file: ./odoo-docker/target/odoo-build/eip-odoo-openmrs-ampath-image/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_OWNER }}/${{ env.REPO_NAME }}-${{ env.EIP_ODOO_OPENMRS_AMPATH_IMAGE }}:${{ steps.vars.outputs.SHORT_SHA }}
            ghcr.io/${{ env.IMAGE_OWNER }}/${{ env.REPO_NAME }}-${{ env.EIP_ODOO_OPENMRS_AMPATH_IMAGE }}:latest
            ghcr.io/${{ env.IMAGE_OWNER }}/${{ env.REPO_NAME }}-${{ env.EIP_ODOO_OPENMRS_AMPATH_IMAGE }}:${{ env.RELEASE_VERSION }}
