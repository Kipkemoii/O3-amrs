# Single-file Odoo stack + EIP clients (from Mekom ozone-docker).
# Isolates: docker-compose-odoo.yml + docker-compose-eip-odoo-openmrs.yml + docker-compose-eip-odoo-openelis.yml + required parts of docker-compose-common.yml.
#
# Usage:
#   docker compose -f docker-compose-odoo.yml up -d
# Optional: copy .env.odoo.example to .env.odoo and set variables (or export them).
#
# Services: postgresql, mysql, env-substitution, odoo, fhir-odoo, eip-odoo-openmrs
# Default EIP image: AMPATH customised full Ozone client (ghcr.io/ampath/o3-amrs-eip-odoo-openmrs-ampath).
# EIP OpenMRS: set OPENMRS_* when running alongside OpenMRS (e.g. backend). Extra order types: EIP_ORDER_TYPE_UUIDS.

networks:
  ozone:
  web:

services:
  # ---------- Postgres (Odoo DB) ----------
  # AMPATH-built image; set ODOO_POSTGRES_IMAGE to override (e.g. postgres:13 or another tag)
  postgresql:
    image: ${ODOO_POSTGRES_IMAGE:-ghcr.io/ampath/o3-amrs-odoo-postgres:latest}
    command: postgres -c wal_level=logical -c max_wal_senders=10 -c max_replication_slots=10 -c max_connections=200 -c max_slot_wal_keep_size=2GB
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      ODOO_DB_NAME: ${ODOO_DATABASE:-odoo}
      ODOO_DB_USER: ${ODOO_DB_USER:-odoo}
      ODOO_DB_PASSWORD: ${ODOO_DB_PASSWORD:-password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped
    volumes:
      - "${POSTGRES_DATADIR:-postgresql-data}:/var/lib/postgresql/data"

  # ---------- MySQL (EIP + optional OpenMRS) ----------
  mysql:
    image: mariadb:10.8
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
      - --log-bin=mysqld-bin
      - --binlog-format=ROW
      - --server-id=2
      - --sync-binlog=1
      - --binlog-annotate-row-events=0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-password}
      EIP_DB_NAME_ODOO: ${EIP_DB_NAME_ODOO:-openmrs_eip_mgt_odoo}
      EIP_DB_USER_ODOO: ${EIP_DB_USER_ODOO:-openmrs_eip_mgt_odoo}
      EIP_DB_PASSWORD_ODOO: ${EIP_DB_PASSWORD_ODOO:-password}
    healthcheck:
      test: "exit 0"
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    restart: unless-stopped
    volumes:
      - "${MYSQL_DATADIR:-mysql-data}:/var/lib/mysql"

  # ---------- Env substitution (Odoo config) ----------
  env-substitution:
    image: mekomsolutions/env-substitution
    restart: on-failure
    volumes:
      - "${DISTRO_PATH:-.}:/opt/env-substitution/files"
    environment:
      - ODOO_PUBLIC_URL=${SERVER_SCHEME:-http}://${ODOO_HOSTNAME:-localhost:8069}
      - EXTERNAL_FHIR_API_URL=http://fhir-odoo:8080/odoo/fhir/R4
      - EXTERNAL_FHIR_API_USERNAME=${ODOO_USER:-admin}
      - EXTERNAL_FHIR_API_PASSWORD=${ODOO_PASSWORD:-admin}

  # ---------- Odoo ----------
  # Use AMPATH-built image (Ozone config + addons) or override with ODOO_IMAGE
  odoo:
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      - HOST=${POSTGRES_DB_HOST:-postgresql}
      - USER=${ODOO_DB_USER:-odoo}
      - PASSWORD=${ODOO_DB_PASSWORD:-password}
      - ADDONS=${ODOO_ADDONS:-sale_management,stock,account,purchase,mrp,odoo_initializer,mrp_product_expiry,product_expiry,ampath_billing,l10n_ke}
      - INITIALIZER_DATA_FILES_PATH=/mnt/odoo_config
      - INITIALIZER_CONFIG_FILE_PATH=/mnt/odoo_config/initializer_config.json
    image: ${ODOO_IMAGE:-ghcr.io/ampath/o3-amrs-odoo:latest}
    ports:
      - "${ODOO_PUBLIC_PORT:-8069}:8069"
    restart: unless-stopped
    volumes:
      - "${ODOO_FILESTORE:-odoo-filestore}:/var/lib/odoo/filestore"
     # - "${ODOO_EXTRA_ADDONS:-odoo-extra-addons}:/mnt/extra-addons"
      #- "${ODOO_CONFIG_PATH:-odoo-config}:/mnt/odoo_config"
      - "${ODOO_CONFIG_CHECKSUMS_PATH:-odoo-checksums}:/mnt/checksums"

  # ---------- FHIR Odoo facade ----------
  fhir-odoo:
    depends_on:
      env-substitution:
        condition: service_completed_successfully
      odoo:
        condition: service_started
    environment:
      - ODOO_HOST=http://odoo
      - ODOO_PORT=8069
      - ODOO_DATABASE=${ODOO_DATABASE:-odoo}
      - EIP_ODOO_DRUGS_CATEGORY_EXT_ID=${EIP_ODOO_DRUGS_CATEGORY_EXT_ID:-categ_products_drug_orders}
    image: mekomsolutions/fhir-odoo
    ports:
      - "${FHIR_ODOO_PUBLIC_PORT:-8083}:8080"
    restart: unless-stopped

  # ---------- EIP: Odoo <-> OpenMRS (full Ozone + AMPATH synthetic ServiceRequest) ----------
  eip-odoo-openmrs:
    depends_on:
      env-substitution:
        condition: service_completed_successfully
      mysql:
        condition: service_started
      odoo:
        condition: service_started
    environment:
      - EIP_DB_NAME_ODOO=${EIP_DB_NAME_ODOO:-openmrs_eip_mgt_odoo}
      - EIP_DB_USER_ODOO=${EIP_DB_USER_ODOO:-openmrs_eip_mgt_odoo}
      - EIP_DB_PASSWORD_ODOO=${EIP_DB_PASSWORD_ODOO:-password}
      - ODOO_DATABASE=${ODOO_DATABASE:-odoo}
      - ODOO_USER=${ODOO_USER:-admin}
      - ODOO_PASSWORD=${ODOO_PASSWORD:-admin}
      - ODOO_URL=http://odoo:8069
      - OPENMRS_URL=${OPENMRS_URL:-http://backend:8080/openmrs}
      - EIP_PROFILE=${EIP_PROFILE:-prod}
      - EIP_APP_SCAN_PACKAGES=${EIP_APP_SCAN_PACKAGES:-com.ozonehis,org.openmrs.eip}
      - MYSQL_ADMIN_USER=${OPENMRS_DB_USER:-openmrs}
      - MYSQL_ADMIN_USER_PASSWORD=${OPENMRS_DB_PASSWORD:-openmrs}
      - DEBEZIUM_DB_SERVERID=${DEBEZIUM_DB_SERVERID_MAIN:-54320}
      - OPENMRS_DB_HOST=${OPENMRS_DB_HOST:-db}
      - OPENMRS_DB_PORT=${OPENMRS_DB_PORT:-3306}
      - OPENMRS_DB_NAME=${OPENMRS_DB_NAME:-amrs}
      - OPENMRS_DB_USER=${OPENMRS_DB_USER:-openmrs}
      - OPENMRS_DB_PASSWORD=${OPENMRS_DB_PASSWORD:-openmrs}
      - OPENMRS_USER=${OPENMRS_USER:-admin}
      - OPENMRS_PASSWORD=${OPENMRS_PASSWORD:-Admin123}
      - EIP_FHIR_RESOURCES=${EIP_FHIR_RESOURCES:-Patient,ServiceRequest,MedicationRequest}
      - EIP_FHIR_SERVER_URL=${EIP_FHIR_SERVER_URL:-http://backend:8080/openmrs/ws/fhir2/R4}
      - EIP_FHIR_USERNAME=${OPENMRS_USER:-admin}
      - EIP_FHIR_PASSWORD=${OPENMRS_PASSWORD:-Admin123}
      - EIP_TEST_ORDER_TYPE_UUID=${EIP_TEST_ORDER_TYPE_UUID:-53eb4768-1359-11df-a1f1-0026b9348838}
      - EIP_DRUG_ORDER_TYPE_UUID=${EIP_DRUG_ORDER_TYPE_UUID:-53eb466e-1359-11df-a1f1-0026b9348838}
      - EIP_SUPPLYREQUEST_ORDER_TYPE_UUID=${EIP_SUPPLYREQUEST_ORDER_TYPE_UUID:-58ea528c-8f62-45f0-86a2-f7d1327b8c56}
      - EIP_IMAGING_ORDER_TYPE_UUID=${EIP_IMAGING_ORDER_TYPE_UUID:-}
      - EIP_PROCEDURE_ORDER_TYPE_UUID=${EIP_PROCEDURE_ORDER_TYPE_UUID:-}
      - EIP_ODOO_FHIR_SERVER_URL=${EIP_ODOO_FHIR_SERVER_URL:-http://fhir-odoo:8080}
      - EIP_ODOO_FHIR_USERNAME=${ODOO_USER:-admin}
      - EIP_ODOO_FHIR_PASSWORD=${ODOO_PASSWORD:-admin}
      - EIP_PRODUCT_SYNC_INITIAL_DELAY=${EIP_PRODUCT_SYNC_INITIAL_DELAY:-60000}
      - EIP_PRODUCT_SYNC_DELAY=${EIP_PRODUCT_SYNC_DELAY:-300000}
      - WEIGHT_CONCEPT_UUID=${WEIGHT_CONCEPT_UUID:-a8a660ca-1350-11df-a1f1-0026b9348838}
      - HEIGHT_CONCEPT_UUID=${HEIGHT_CONCEPT_UUID:-a8a6619c-1350-11df-a1f1-0026b9348838}
      - EIP_WATCHED_TABLES=${EIP_WATCHED_TABLES:-patient,person_name,person_address,patient_identifier,orders,test_order,drug_order}
      - DB_EVENT_DESTINATIONS_ODOO=${DB_EVENT_DESTINATIONS_ODOO:-direct:odoo-event-listener}
      - CREATE_CUSTOMER_IF_NOT_EXIST=${CREATE_CUSTOMER_IF_NOT_EXIST:-false}
      - ODOO_CUSTOMER_EXTERNAL_ID=${ODOO_CUSTOMER_EXTERNAL_ID:-comment}
      - ODOO_CUSTOMER_ID_FIELD=${ODOO_CUSTOMER_ID_FIELD:-x_external_identifier}
      - ODOO_CUSTOMER_DOB_FIELD=${ODOO_CUSTOMER_DOB_FIELD:-x_customer_dob}
      - ODOO_CUSTOMER_WEIGHT_FIELD=${ODOO_CUSTOMER_WEIGHT_FIELD:-x_customer_weight}
      - EMR_WEIGHT_CONCEPT=${EMR_WEIGHT_CONCEPT:-a8a660ca-1350-11df-a1f1-0026b9348838}
      - ODOO_ENABLE_EXTRA_CUSTOMER_FIELDS_ROUTE=${ODOO_ENABLE_EXTRA_CUSTOMER_FIELDS_ROUTE:-true}
      - ODOO_ENABLE_EXTRA_QUOTATION_FIELDS_ROUTE=${ODOO_ENABLE_EXTRA_QUOTATION_FIELDS_ROUTE:-true}
      - EIP_ODOO_PARTNER_APPEND_IDENTIFIER_TO_NAME=${EIP_ODOO_PARTNER_APPEND_IDENTIFIER_TO_NAME:-true}
      # Order types that use OpenMRS REST + synthetic ServiceRequest (replaces former eip-odoo-ampath client)
      - EIP_ORDER_TYPE_UUIDS=${EIP_ORDER_TYPE_UUIDS:-ff4485a4-f071-4423-aeb2-db6efce52b83,2315ab24-9a4e-4b36-b189-8e74d2c77394,2da15461-81db-43bc-a2c0-853741bece90}
    image: ${EIP_ODOO_OPENMRS_IMAGE:-ghcr.io/ampath/o3-amrs-eip-odoo-openmrs-ampath:latest}
    restart: unless-stopped
    volumes:
      - eip-home-odoo:/eip-home

volumes:
  postgresql-data:
  mysql-data:
  odoo-filestore:
  odoo-config:
  odoo-extra-addons:
  odoo-checksums:
  eip-home-odoo:

