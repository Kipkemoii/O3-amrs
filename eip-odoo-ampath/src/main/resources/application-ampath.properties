# AMPATH custom EIP extension properties
#
# Order types handled by GenericOrderRouting (routed via FHIR → Odoo ServiceRequest pipeline):
#   ff4485a4-f071-4423-aeb2-db6efce52b83  =  Radiology Order
#   2315ab24-9a4e-4b36-b189-8e74d2c77394  =  Procedure Order
#   2da15461-81db-43bc-a2c0-853741bece90  =  Consultation Cash
#
# These two types use org.openmrs.Order (not TestOrder/DrugOrder), so they are NOT
# picked up by the upstream ServiceRequestRouter or ProcedureRouter.
# Override via EIP_GENERIC_ORDER_TYPE_UUIDS env var if needed.
eip.generic.order.type.uuids=${EIP_GENERIC_ORDER_TYPE_UUIDS:-ff4485a4-f071-4423-aeb2-db6efce52b83,2315ab24-9a4e-4b36-b189-8e74d2c77394,2da15461-81db-43bc-a2c0-853741bece90}

# Log each send to direct:fhir-handler-servicerequest (see FhirHandlerServiceRequestInterceptRouting).
# eip.ampath.servicerequest.intercept.log=true
